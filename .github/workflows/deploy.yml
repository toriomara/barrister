name: CI/CD - Gitflow Barrister

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # Deploy in push to main only
  deploy-production:
    needs: build-and-check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Beget VPS
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e

            echo "🚀 Starting PRODUCTION deployment..."

            cd /var/www/barrister

            echo "📥 Updating repository..."
          git fetch origin
          git reset --hard origin/main
          git clean -fd

          echo "📦 Installing dependencies..."
          export NODE_ENV=production 
          npm ci

          echo "🗄️ Generating Prisma client..."
          npx prisma generate

          echo "🗄️ Syncing schema..."
          npx prisma db push

          # Выполнять только если сид безопасен для повторного запуска/идемпотентен
          # npx prisma db seed

          # Check if .env file exists
          test -f .env || (echo ".env not found!" && exit 1)

          echo "🏗️ Building project..."
          NODE_OPTIONS=--max-old-space-size=768 npm run build 
          pm2 restart barrister --update-env

          echo "♻️ Restarting PM2..."
          pm2 describe barrister > /dev/null \
            && pm2 restart barrister --update-env \
            || pm2 start npm --name "barrister" -- start

          pm2 save

          echo "✅ Deployment completed successfully! ($(date))"

          EOF
